basePath: /
definitions:
  model.CreateStudentRequest:
    properties:
      class_id:
        type: string
      first_name:
        type: string
      last_name:
        type: string
      parent_user_id:
        type: string
      section_id:
        type: string
    required:
    - class_id
    - first_name
    - last_name
    type: object
  model.ErrorResponse:
    properties:
      error:
        example: something went wrong
        type: string
    type: object
  model.Student:
    properties:
      class_id:
        type: string
      created_at:
        type: string
      first_name:
        type: string
      id:
        type: string
      is_active:
        type: boolean
      last_name:
        type: string
      parent_user_id:
        type: string
      school_id:
        type: string
      section_id:
        type: string
      updated_at:
        type: string
    type: object
  model.StudentListResponse:
    properties:
      limit:
        type: integer
      page:
        type: integer
      students:
        items:
          $ref: '#/definitions/model.Student'
        type: array
      total:
        type: integer
    type: object
  model.UpdateStudentRequest:
    properties:
      class_id:
        type: string
      first_name:
        type: string
      is_active:
        type: boolean
      last_name:
        type: string
      parent_user_id:
        type: string
      section_id:
        type: string
    type: object
host: localhost:8084
info:
  contact: {}
  description: Student admission and management service.
  title: Student Service API
  version: "1.0"
paths:
  /students:
    get:
      description: List students for authenticated school with filters and pagination.
      parameters:
      - description: Page
        in: query
        name: page
        type: integer
      - description: Limit
        in: query
        name: limit
        type: integer
      - description: Search by first/last name
        in: query
        name: search
        type: string
      - description: Class ID
        in: query
        name: class_id
        type: string
      - description: Section ID
        in: query
        name: section_id
        type: string
      - description: Parent User ID
        in: query
        name: parent_user_id
        type: string
      - description: Active status
        in: query
        name: is_active
        type: boolean
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/model.StudentListResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/model.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/model.ErrorResponse'
      security:
      - BearerAuth: []
      summary: List students
      tags:
      - Students
    post:
      consumes:
      - application/json
      description: Create student, assign class/section, and optionally link parent.
      parameters:
      - description: Student payload
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/model.CreateStudentRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/model.Student'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/model.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Create student
      tags:
      - Students
  /students/{id}:
    patch:
      consumes:
      - application/json
      description: Update student details, class/section assignment, and parent link.
      parameters:
      - description: Student ID
        in: path
        name: id
        required: true
        type: string
      - description: Update payload
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/model.UpdateStudentRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/model.Student'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/model.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Update student
      tags:
      - Students
securityDefinitions:
  BearerAuth:
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
