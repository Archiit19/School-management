basePath: /
definitions:
  model.CreateExamRequest:
    properties:
      class_id:
        type: string
      exam_date:
        type: string
      section_id:
        type: string
      subject_id:
        type: string
      title:
        type: string
      total_marks:
        type: number
    required:
    - class_id
    - exam_date
    - title
    - total_marks
    type: object
  model.EnterMarksRequest:
    properties:
      exam_id:
        type: string
      marks_obtained:
        type: number
      remarks:
        type: string
      student_id:
        type: string
    required:
    - exam_id
    - marks_obtained
    - student_id
    type: object
  model.ErrorResponse:
    properties:
      error:
        example: something went wrong
        type: string
    type: object
  model.Exam:
    properties:
      class_id:
        type: string
      created_at:
        type: string
      created_by:
        type: string
      exam_date:
        type: string
      id:
        type: string
      is_published:
        type: boolean
      school_id:
        type: string
      section_id:
        type: string
      subject_id:
        type: string
      title:
        type: string
      total_marks:
        type: number
      updated_at:
        type: string
    type: object
  model.Mark:
    properties:
      created_at:
        type: string
      created_by:
        type: string
      exam_id:
        type: string
      id:
        type: string
      marks_obtained:
        type: number
      remarks:
        type: string
      school_id:
        type: string
      student_id:
        type: string
      updated_at:
        type: string
    type: object
  model.PublishResultRequest:
    properties:
      exam_id:
        type: string
    required:
    - exam_id
    type: object
  model.ResultItem:
    properties:
      exam_date:
        type: string
      exam_id:
        type: string
      exam_title:
        type: string
      grade:
        type: string
      marks_obtained:
        type: number
      percentage:
        type: number
      published:
        type: boolean
      student_id:
        type: string
      total_marks:
        type: number
    type: object
host: localhost:8086
info:
  contact: {}
  description: Exam lifecycle service for exams, marks and results.
  title: Exam Service API
  version: "1.0"
paths:
  /exams:
    post:
      consumes:
      - application/json
      description: Create a new exam for class/subject.
      parameters:
      - description: Exam payload
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/model.CreateExamRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/model.Exam'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/model.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Create exam
      tags:
      - Exams
  /marks:
    post:
      consumes:
      - application/json
      description: Enter or update marks for a student in an exam.
      parameters:
      - description: Marks payload
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/model.EnterMarksRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/model.Mark'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/model.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Enter marks
      tags:
      - Exams
  /results:
    get:
      description: Fetch computed result entries for report cards.
      parameters:
      - description: Exam ID
        in: query
        name: exam_id
        type: string
      - description: Student ID
        in: query
        name: student_id
        type: string
      - description: Class ID
        in: query
        name: class_id
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/model.ResultItem'
            type: array
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/model.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Get results
      tags:
      - Results
  /results/publish:
    post:
      consumes:
      - application/json
      description: Publish exam results for report card visibility.
      parameters:
      - description: Publish payload
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/model.PublishResultRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/model.Exam'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/model.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Publish results
      tags:
      - Results
securityDefinitions:
  BearerAuth:
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
