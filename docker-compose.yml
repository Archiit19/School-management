version: "3.9"

services:
  # ──────────────────────────────────────
  # PostgreSQL for Auth Service
  # ──────────────────────────────────────
  auth-db:
    image: postgres:16-alpine
    container_name: auth-db
    environment:
      POSTGRES_USER: auth_user
      POSTGRES_PASSWORD: auth_pass
      POSTGRES_DB: auth_db
    ports:
      - "15433:5432"  # avoid conflict with local PostgreSQL on 5433
    volumes:
      - auth_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U auth_user -d auth_db"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ──────────────────────────────────────
  # PostgreSQL for User Service
  # ──────────────────────────────────────
  user-db:
    image: postgres:16-alpine
    container_name: user-db
    environment:
      POSTGRES_USER: user_user
      POSTGRES_PASSWORD: user_pass
      POSTGRES_DB: user_db
    ports:
      - "5434:5432"
    volumes:
      - user_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user_user -d user_db"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ──────────────────────────────────────
  # PostgreSQL for Academic Service
  # ──────────────────────────────────────
  academic-db:
    image: postgres:16-alpine
    container_name: academic-db
    environment:
      POSTGRES_USER: academic_user
      POSTGRES_PASSWORD: academic_pass
      POSTGRES_DB: academic_db
    ports:
      - "5435:5432"
    volumes:
      - academic_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U academic_user -d academic_db"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ──────────────────────────────────────
  # DynamoDB Local (user role profiles)
  # ──────────────────────────────────────
  dynamodb-local:
    image: amazon/dynamodb-local:latest
    container_name: dynamodb-local
    command: "-jar DynamoDBLocal.jar -sharedDb -inMemory"
    ports:
      - "8000:8000"

  # ──────────────────────────────────────
  # PostgreSQL for Attendance Service
  # ──────────────────────────────────────
  attendance-db:
    image: postgres:16-alpine
    container_name: attendance-db
    environment:
      POSTGRES_USER: attendance_user
      POSTGRES_PASSWORD: attendance_pass
      POSTGRES_DB: attendance_db
    ports:
      - "5437:5432"
    volumes:
      - attendance_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U attendance_user -d attendance_db"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ──────────────────────────────────────
  # PostgreSQL for Exam Service
  # ──────────────────────────────────────
  exam-db:
    image: postgres:16-alpine
    container_name: exam-db
    environment:
      POSTGRES_USER: exam_user
      POSTGRES_PASSWORD: exam_pass
      POSTGRES_DB: exam_db
    ports:
      - "5438:5432"
    volumes:
      - exam_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U exam_user -d exam_db"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ──────────────────────────────────────
  # PostgreSQL for Finance Service
  # ──────────────────────────────────────
  finance-db:
    image: postgres:16-alpine
    container_name: finance-db
    environment:
      POSTGRES_USER: finance_user
      POSTGRES_PASSWORD: finance_pass
      POSTGRES_DB: finance_db
    ports:
      - "5439:5432"
    volumes:
      - finance_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U finance_user -d finance_db"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ──────────────────────────────────────
  # PostgreSQL for School Service
  # ──────────────────────────────────────
  school-db:
    image: postgres:16-alpine
    container_name: school-db
    environment:
      POSTGRES_USER: school_user
      POSTGRES_PASSWORD: school_pass
      POSTGRES_DB: school_db
    ports:
      - "5440:5432"
    volumes:
      - school_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U school_user -d school_db"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ──────────────────────────────────────
  # Auth Service
  # ──────────────────────────────────────
  auth-service:
    build:
      context: ./auth-service
      dockerfile: Dockerfile
    container_name: auth-service
    ports:
      - "8081:8081"
    environment:
      DB_HOST: auth-db
      DB_PORT: 5432
      DB_USER: auth_user
      DB_PASSWORD: auth_pass
      DB_NAME: auth_db
      JWT_SECRET: super-secret-jwt-key-change-in-production
      USER_SERVICE_URL: http://user-service:8082
      SCHOOL_SERVICE_URL: http://school-service:8088
      INTERNAL_SERVICE_TOKEN: dev-internal-token-change-in-production
      PORT: 8081
    depends_on:
      auth-db:
        condition: service_healthy

  # ──────────────────────────────────────
  # User Service
  # ──────────────────────────────────────
  user-service:
    build:
      context: ./user-service
      dockerfile: Dockerfile
    container_name: user-service
    ports:
      - "8082:8082"
    environment:
      DB_HOST: user-db
      DB_PORT: 5432
      DB_USER: user_user
      DB_PASSWORD: user_pass
      DB_NAME: user_db
      JWT_SECRET: super-secret-jwt-key-change-in-production
      AUTH_SERVICE_URL: http://auth-service:8081
      SCHOOL_SERVICE_URL: http://school-service:8088
      ACADEMIC_SERVICE_URL: http://academic-service:8083
      DYNAMODB_ENDPOINT: http://dynamodb-local:8000
      DYNAMODB_TABLE: user_profiles
      AWS_REGION: us-east-1
      INTERNAL_SERVICE_TOKEN: dev-internal-token-change-in-production
      PORT: 8082
    depends_on:
      user-db:
        condition: service_healthy
      dynamodb-local:
        condition: service_started

  # ──────────────────────────────────────
  # Academic Service
  # ──────────────────────────────────────
  academic-service:
    build:
      context: ./academic-service
      dockerfile: Dockerfile
    container_name: academic-service
    ports:
      - "8083:8083"
    environment:
      DB_HOST: academic-db
      DB_PORT: 5432
      DB_USER: academic_user
      DB_PASSWORD: academic_pass
      DB_NAME: academic_db
      JWT_SECRET: super-secret-jwt-key-change-in-production
      USER_SERVICE_URL: http://user-service:8082
      INTERNAL_SERVICE_TOKEN: dev-internal-token-change-in-production
      PORT: 8083
    depends_on:
      academic-db:
        condition: service_healthy

  # ──────────────────────────────────────
  # Attendance Service
  # ──────────────────────────────────────
  attendance-service:
    build:
      context: ./attendance-service
      dockerfile: Dockerfile
    container_name: attendance-service
    ports:
      - "8085:8085"
    environment:
      DB_HOST: attendance-db
      DB_PORT: 5432
      DB_USER: attendance_user
      DB_PASSWORD: attendance_pass
      DB_NAME: attendance_db
      JWT_SECRET: super-secret-jwt-key-change-in-production
      USER_SERVICE_URL: http://user-service:8082
      ACADEMIC_SERVICE_URL: http://academic-service:8083
      INTERNAL_SERVICE_TOKEN: dev-internal-token-change-in-production
      PORT: 8085
    depends_on:
      attendance-db:
        condition: service_healthy
      user-service:
        condition: service_started
      academic-service:
        condition: service_started

  # ──────────────────────────────────────
  # Exam Service
  # ──────────────────────────────────────
  exam-service:
    build:
      context: ./exam-service
      dockerfile: Dockerfile
    container_name: exam-service
    ports:
      - "8086:8086"
    environment:
      DB_HOST: exam-db
      DB_PORT: 5432
      DB_USER: exam_user
      DB_PASSWORD: exam_pass
      DB_NAME: exam_db
      JWT_SECRET: super-secret-jwt-key-change-in-production
      ACADEMIC_SERVICE_URL: http://academic-service:8083
      USER_SERVICE_URL: http://user-service:8082
      PORT: 8086
    depends_on:
      exam-db:
        condition: service_healthy

  # ──────────────────────────────────────
  # Finance Service
  # ──────────────────────────────────────
  finance-service:
    build:
      context: ./finance-service
      dockerfile: Dockerfile
    container_name: finance-service
    ports:
      - "8087:8087"
    environment:
      DB_HOST: finance-db
      DB_PORT: 5432
      DB_USER: finance_user
      DB_PASSWORD: finance_pass
      DB_NAME: finance_db
      JWT_SECRET: super-secret-jwt-key-change-in-production
      PORT: 8087
    depends_on:
      finance-db:
        condition: service_healthy

  # ──────────────────────────────────────
  # School Service
  # ──────────────────────────────────────
  school-service:
    build:
      context: ./school-service
      dockerfile: Dockerfile
    container_name: school-service
    ports:
      - "8088:8088"
    environment:
      DB_HOST: school-db
      DB_PORT: 5432
      DB_USER: school_user
      DB_PASSWORD: school_pass
      DB_NAME: school_db
      JWT_SECRET: super-secret-jwt-key-change-in-production
      AUTH_SERVICE_URL: http://auth-service:8081
      INTERNAL_SERVICE_TOKEN: dev-internal-token-change-in-production
      PORT: 8088
    depends_on:
      school-db:
        condition: service_healthy

volumes:
  auth_db_data:
  user_db_data:
  academic_db_data:
  attendance_db_data:
  exam_db_data:
  finance_db_data:
  school_db_data:
